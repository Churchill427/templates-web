<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | SpaceCraft Organizers</title>
  <meta name="description" content="Login to your SpaceCraft account to manage bookings, view your dashboard, and access exclusive content.">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/icons/favicon-32x32.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/responsive-fix.css">
  <style>html,body{height:100%;}
  .login-topbar{position:fixed;top:12px;right:12px;display:flex;gap:8px;z-index:200;}
  [dir="rtl"] .login-topbar{right:auto;left:12px;}
  .login-topbar .nav-icon-btn{background:rgba(255,255,255,0.15);backdrop-filter:blur(8px);color:#fff;border:1px solid rgba(255,255,255,0.3);}
  .login-topbar .nav-icon-btn:hover{background:rgba(255,255,255,0.3);}
  [data-theme="dark"] .login-topbar .nav-icon-btn{background:rgba(0,0,0,0.3);color:var(--text-primary);}
  </style>
</head>
<body>
  <div class="auth-page" style="background-image:url('assets/images/hero/hero-home1.png');">
    <!-- Theme & RTL Controls -->
    <div class="login-topbar">
      <button class="nav-icon-btn" id="themeToggle" aria-label="Toggle theme"><i class="fas fa-moon"></i></button>
      <button class="nav-icon-btn" id="rtlToggle" aria-label="Toggle direction">RTL</button>
    </div>
    <div class="auth-card">
      <div class="auth-brand">
        <a href="index.html">
          <div class="nav-brand-icon"><i class="fas fa-leaf"></i></div>
          <span class="nav-brand-text">SpaceCraft</span>
        </a>
      </div>

      <form data-validate>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" placeholder="••••••••" required>
        </div>
        <div class="form-row">
          <div class="form-check">
            <input type="checkbox" id="remember">
            <label for="remember">Remember me</label>
          </div>
          <a href="#">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-block" style="margin-bottom:0;">Sign In</button>
      </form>

      <div class="auth-divider">Or continue with</div>

      <div class="social-login">
        <button class="social-btn google" aria-label="Sign in with Google"><i class="fab fa-google"></i> Google</button>
        <button class="social-btn facebook" aria-label="Sign in with Facebook"><i class="fab fa-facebook-f"></i> Facebook</button>
        <button class="social-btn apple" aria-label="Sign in with Apple"><i class="fab fa-apple"></i> Apple</button>
      </div>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Sign up</a>
      </div>
    </div>
  </div>
  <script src="assets/js/main.js"></script>
</body>
</html>

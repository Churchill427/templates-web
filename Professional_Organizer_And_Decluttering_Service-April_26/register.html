<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | SpaceCraft Organizers</title>
  <meta name="description" content="Create your SpaceCraft account to book organizing services, track projects, and access exclusive organization tips.">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/icons/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/images/icons/apple-touch-icon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/responsive-fix.css">
  <style>html,body{height:100%;}
  .login-topbar{position:fixed;top:12px;right:12px;display:flex;gap:8px;z-index:200;}
  [dir="rtl"] .login-topbar{right:auto;left:12px;}
  .login-topbar .nav-icon-btn{background:rgba(255,255,255,0.15);backdrop-filter:blur(8px);color:#fff;border:1px solid rgba(255,255,255,0.3);}
  .login-topbar .nav-icon-btn:hover{background:rgba(255,255,255,0.3);}
  [data-theme="dark"] .login-topbar .nav-icon-btn{background:rgba(0,0,0,0.3);color:var(--text-primary);}
  </style>
  <style>html,body{height:100%;}</style>
</head>
<body>
  <!-- NO NAVBAR ON REGISTER PAGE -->
  <div class="auth-page" style="background-image:url('assets/images/hero/hero-home2.png');">
    <div class="login-topbar">
      <button class="nav-icon-btn" id="themeToggle" aria-label="Toggle theme"><i class="fas fa-moon"></i></button>
      <button class="nav-icon-btn" id="rtlToggle" aria-label="Toggle direction">RTL</button>
    </div>
    <div class="auth-card">
      <div class="auth-brand">
        <a href="index.html">
          <div class="nav-brand-icon"><i class="fas fa-leaf"></i></div>
          <span class="nav-brand-text">SpaceCraft</span>
        </a>
      </div>

      <form data-validate>
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-input" placeholder="Jane Doe" required id="regName">
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" placeholder="you@example.com" required id="regEmail">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" placeholder="••••••••" required id="regPassword" minlength="8">
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-input" placeholder="••••••••" required id="regConfirmPassword">
        </div>
        <div class="form-check">
          <input type="checkbox" id="terms" required>
          <label for="terms">I agree to the <a href="#" style="color:var(--primary);font-weight:500;">Terms of Service</a> and <a href="#" style="color:var(--primary);font-weight:500;">Privacy Policy</a></label>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Create Account</button>
      </form>

      <div class="auth-divider">Or continue with</div>

      <div class="social-login">
        <button class="social-btn google" aria-label="Sign up with Google"><i class="fab fa-google"></i> Google</button>
        <button class="social-btn facebook" aria-label="Sign up with Facebook"><i class="fab fa-facebook-f"></i> Facebook</button>
        <button class="social-btn apple" aria-label="Sign up with Apple"><i class="fab fa-apple"></i> Apple</button>
      </div>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>
  <!-- NO FOOTER ON REGISTER PAGE -->
  <script src="assets/js/main.js"></script>
</body>
</html>

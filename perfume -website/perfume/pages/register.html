<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AromaLux</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'>
<text y='50' font-size='50'>🧴</text>
</svg>">
</head>
<body class="antialiased bg-gradient-to-br from-yellow-50 via-white to-pink-50 min-h-screen flex items-center justify-center p-4">
    
    <!-- Theme & RTL Toggles -->
    <div class="fixed top-4 right-4 z-50 flex items-center gap-3">
        <button onclick="toggleRTL()" class="w-10 h-10 bg-white rounded-full shadow-lg flex items-center justify-center text-gray-700 hover:text-yellow-600 hover:shadow-xl transition-all" title="Toggle RTL/LTR">
            <i class="fas fa-globe text-lg"></i>
        </button>
        <button onclick="toggleDarkMode()" class="dark-mode-toggle w-10 h-10 bg-white rounded-full shadow-lg flex items-center justify-center text-gray-700 hover:text-yellow-600 hover:shadow-xl transition-all" title="Toggle Dark Mode">
            <i class="fas fa-moon text-lg"></i>
        </button>
    </div>
    
    <div class="max-w-md w-full">
        <div class="auth-intro text-center mb-8">
            <a href="index.html" class="inline-flex items-center space-x-2 mb-6">
                <i class="fas fa-spray-can text-4xl text-yellow-600"></i>
                <span class="text-3xl font-bold font-serif text-gray-900">AromaLux</span>
            </a>
            <h1 class="text-3xl font-bold mb-2 text-gray-900">Create Account</h1>
            <p class="text-gray-600">Join our luxury fragrance community</p>
        </div>
        
        <div class="bg-white rounded-2xl shadow-xl p-8">
            <form id="registerForm" onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
                <div class="mb-6">
                    <label class="block text-gray-700 font-semibold mb-2">Full Name</label>
                    <input type="text" required class="input-luxury" placeholder="John Doe">
                </div>
                
                <div class="mb-6">
                    <label class="block text-gray-700 font-semibold mb-2">Email Address</label>
                    <input type="email" required class="input-luxury" placeholder="your@email.com">
                </div>
                
                <div class="mb-6">
                    <label class="block text-gray-700 font-semibold mb-2">Password</label>
                    <input type="password" required class="input-luxury" placeholder="••••••••">
                </div>
                
                <div class="mb-6">
                    <label class="block text-gray-700 font-semibold mb-2">Confirm Password</label>
                    <input type="password" required class="input-luxury" placeholder="••••••••">
                </div>
                
                <div class="mb-6">
                    <label class="flex items-center cursor-pointer">
                        <input type="checkbox" required class="mr-2">
                        <span class="text-sm text-gray-600">I agree to the <a href="#" class="text-yellow-600 hover:underline">Terms</a> and <a href="#" class="text-yellow-600 hover:underline">Privacy Policy</a></span>
                    </label>
                </div>
                
                <button type="submit" class="btn-luxury w-full mb-6">Create Account</button>
            </form>
            
            <p class="text-center text-gray-600">
                Already have an account? 
                <a href="login.html" class="text-yellow-600 font-semibold hover:underline">Sign in</a>
            </p>
        </div>
        
    </div>
    
    <script src="../assets/js/main.js"></script>
</body>
</html>

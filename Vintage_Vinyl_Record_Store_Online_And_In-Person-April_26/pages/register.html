<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Vintage Vinyl</title>
  <meta name="description" content="Create your Vintage Vinyl account to start building your collection online.">


  <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicons/favicon-32x32.png?v=2">
  <link rel="shortcut icon" href="../assets/images/favicons/favicon-32x32.png?v=2">
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/images/favicons/apple-touch-icon.png">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
  <style>
    html,
    body {
      min-height: 100%;
      margin: 0;
      padding: 0;
      width: 100%;
      overflow-x: hidden;
    }

    .auth-page {
      min-height: 100vh;
      display: flex;
      width: 100%;
      background: linear-gradient(135deg, var(--bg-primary), var(--bg-secondary));
      position: relative;
    }

    .auth-left {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-6);
      width: 100%;
    }

    .auth-right {
      flex: 1;
      position: relative;
      display: none;
    }

    @media(min-width:1024px) {
      .auth-right {
        display: block;
      }
    }

    .auth-right img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .auth-right::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 215, 0, .7), rgba(26, 26, 46, .8));
    }

    .auth-right__content {
      position: absolute;
      bottom: var(--space-12);
      left: var(--space-12);
      right: var(--space-12);
      z-index: 2;
      color: #fff;
    }

    .auth-card {
      width: 100%;
      max-width: 440px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-2xl);
      padding: var(--space-8);
      box-shadow: var(--shadow-xl);
      position: relative;
    }

    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      margin-bottom: var(--space-6);
      text-decoration: none;
      color: var(--text-primary);
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      margin: var(--space-4) 0;
      color: var(--text-muted);
      font-size: var(--text-sm);
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-color);
    }

    .social-btn {
      width: 100%;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--text-primary);
      background: var(--bg-card);
      transition: all var(--transition-fast);
      cursor: pointer;
    }

    .social-btn:hover {
      border-color: var(--color-primary);
      background: var(--bg-secondary);
    }

    .auth-footer {
      text-align: center;
      margin-top: var(--space-4);
      font-size: var(--text-sm);
      color: var(--text-muted);
    }

    .auth-footer a {
      color: var(--color-accent);
      font-weight: 600;
    }

    .theme-float-bar {
      position: absolute;
      top: var(--space-4);
      right: var(--space-4);
      z-index: 10;
      display: flex;
      gap: var(--space-2);
    }

    .theme-float-bar button {
      padding: 10px;
      background: var(--bg-card);
      border-radius: 50%;
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      box-shadow: var(--shadow-sm);
      opacity: 0.9;
      transition: all var(--transition-fast);
    }

    .theme-float-bar button:hover {
      background: var(--bg-secondary);
      opacity: 1;
    }

    .name-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
    }

    @media (max-width: 640px) {
      .auth-left {
        padding: var(--space-4);
      }

      .auth-card {
        padding: var(--space-6);
        border: none;
        box-shadow: none;
        background: transparent;
      }

      .name-row {
        grid-template-columns: 1fr;
        gap: 0;
      }

      .social-row {
        flex-direction: column;
      }

      .social-btn {
        margin-bottom: var(--space-3);
        width: 100% !important;
      }
    }
  </style>
</head>

<body>
  <div class="auth-page">
    <div class="theme-float-bar">
      <button class="navbar__icon-btn theme-toggle" aria-label="Toggle theme">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-sun"
          style="display:none;">
          <circle cx="12" cy="12" r="4" />
          <path d="M12 2v2" />
          <path d="M12 20v2" />
          <path d="m4.93 4.93 1.41 1.41" />
          <path d="m17.66 17.66 1.41 1.41" />
          <path d="M2 12h2" />
          <path d="M20 12h2" />
          <path d="m6.34 17.66-1.41 1.41" />
          <path d="m19.07 4.93-1.41 1.41" />
        </svg>
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-moon">
          <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
        </svg>
      </button>
      <button class="navbar__icon-btn dir-toggle" aria-label="Toggle RTL/LTR">LTR</button>
    </div>
    <div class="auth-left">
      <div class="auth-card">
        <a href="../index.html" class="auth-logo">
          <img src="../assets/images/logo/logo.png" alt="Vintage Vinyl Logo" class="navbar__logo-img">
          <span class="navbar__logo-text">Vintage Vinyl</span>
        </a>
        <h1 style="font-size:var(--text-2xl);text-align:center;margin-bottom:var(--space-1);color:var(--text-primary);">
          Create Your Account</h1>
        <p style="text-align:center;color:var(--text-muted);font-size:var(--text-sm);margin-bottom:var(--space-5);">Join
          the vinyl community today</p>

        <div style="display:flex;gap:var(--space-3);">
          <button class="social-btn social-btn--google"><span class="social-icon"
              style="font-size:1.1rem;color:#DB4437;">G</span> Google</button>
          <button class="social-btn social-btn--facebook"><span class="social-icon"
              style="font-size:1.1rem;color:#4267B2;">f</span> Facebook</button>
          <button class="social-btn social-btn--apple"><span class="social-icon"
              style="display:flex;align-items:center;justify-content:center;"><svg xmlns="http://www.w3.org/2000/svg"
                width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <path
                  d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.61 1.09zM15.53 3.83c.843-1.012 1.4-2.427 1.245-3.83-1.207.052-2.662.805-3.532 1.818-.78.896-1.454 2.338-1.273 3.714 1.338.104 2.715-.688 3.559-1.701z" />
              </svg></span> Apple</button>
        </div>
        <div class="auth-divider">or register with email</div>

        <form onsubmit="event.preventDefault();">
          <div class="name-row">
            <div class="form-group"><label class="form-label" for="reg-first">First Name</label><input type="text"
                id="reg-first" class="form-input" placeholder="John" required></div>
            <div class="form-group"><label class="form-label" for="reg-last">Last Name</label><input type="text"
                id="reg-last" class="form-input" placeholder="Doe" required></div>
          </div>
          <div class="form-group"><label class="form-label" for="reg-email">Email</label><input type="email"
              id="reg-email" class="form-input" placeholder="you@example.com" required></div>
          <div class="form-group">
            <label class="form-label" for="reg-password">Password</label>
            <div class="form-input-wrap">
              <input type="password" id="reg-password" class="form-input" placeholder="Min 8 characters" required
                minlength="8" style="padding-right:44px;">
              <span class="form-input-icon"
                onclick="const i=document.getElementById('reg-password');i.type=i.type==='password'?'text':'password'; const btn = this; if(i.type==='password'){ btn.innerHTML = '<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'18\' height=\'18\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\' class=\'icon-eye\'><path d=\'M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z\'/><circle cx=\'12\' cy=\'12\' r=\'3\'/></svg>'; } else { btn.innerHTML = '<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'18\' height=\'18\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\' class=\'icon-eye-off\'><path d=\'M9.88 9.88a3 3 0 1 0 4.24 4.24\'/><path d=\'M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68\'/><path d=\'M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61\'/><line x1=\'2\' x2=\'22\' y1=\'2\' y2=\'22\'/></svg>'; }"
                role="button" tabindex="0" aria-label="Toggle password visibility"><svg
                  xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                  class="icon-eye">
                  <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                  <circle cx="12" cy="12" r="3" />
                </svg></span>
            </div>
          </div>
          <div style="margin-bottom:var(--space-5);">
            <label
              style="font-size:var(--text-xs);color:var(--text-muted);display:flex;align-items:flex-start;gap:var(--space-2);cursor:pointer;">
              <input type="checkbox" required style="accent-color:var(--color-accent);margin-top:2px;">
              I agree to the <a href="#" style="color:var(--color-accent);">Terms of Service</a> and <a href="#"
                style="color:var(--color-accent);">Privacy Policy</a>
            </label>
          </div>
          <button type="submit" class="btn btn--primary btn--full">Create Account</button>
        </form>
        <div class="auth-footer">Already have an account? <a href="login.html">Sign in</a></div>
      </div>
    </div>
    <div class="auth-right">
      <img src="../assets/images/hero/hero-albums.png" alt="Vinyl albums" width="960" height="1080">
      <div class="auth-right__content">
      </div>
    </div>
  </div>
  <script src="../assets/js/theme-switcher.js"></script>
</body>

</html>

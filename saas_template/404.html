<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexaFlow — 404 Not Found</title>
  <link rel="stylesheet" href="style.css" />
  <script src="rtl-toggle.js"></script>
</head>
<body>

<div class="error-page">
  <div class="bg-dots"></div>
  <div style="position:relative; max-width:560px;">
    <div class="error-code">404</div>
    <h2 style="margin-bottom:16px; margin-top:8px;">Page not found</h2>
    <p style="font-size:18px; margin-bottom:40px;">Looks like this page went on a workflow automation journey and didn't come back. Let's get you somewhere useful.</p>
    <div class="flex-center gap-12" style="flex-wrap:wrap;">
      <a href="index.html" class="btn btn-primary btn-lg">← Back to Home</a>
      <a href="contact.html" class="btn btn-outline btn-lg">Contact Support</a>
    </div>
    <div class="mt-48" style="display:flex; flex-direction:column; gap:12px; align-items:center;">
      <p class="text-sm" style="color:var(--clr-muted);">Or try one of these:</p>
      <div class="flex gap-12" style="flex-wrap:wrap; justify-content:center;">
        <a href="pricing.html" class="btn btn-ghost btn-sm">Pricing</a>
        <a href="blog.html" class="btn btn-ghost btn-sm">Blog</a>
        <a href="login.html" class="btn btn-ghost btn-sm">Login</a>
        <a href="register.html" class="btn btn-ghost btn-sm">Register</a>
      </div>
    </div>
  </div>
</div>

<script src="main.js"></script>
<button id="rtlToggle" class="nav-rtl-btn nav-rtl-fixed" title="Toggle RTL/LTR">🌐</button>



<script>
(function() {
  var PAGES = [
    ["index.html","Home Classic"],
    ["index-v2.html","Home Launch"],
    ["about.html","About"],
    ["pricing.html","Pricing"],
    ["portfolio.html","Portfolio"],
    ["blog.html","Blog"],
    ["contact.html","Contact"],
    ["login.html","Login"],
    ["register.html","Register"],
    ["user-dashboard.html","Dashboard"],
    ["admin-dashboard.html","Admin"],
    ["coming-soon.html","Coming Soon"],
    ["404.html","404"]
  ];

  var current = (window.location.pathname.split("/").pop() || "index.html");
  if (current === "") current = "index.html";
  var idx = 0;
  for (var i = 0; i < PAGES.length; i++) {
    if (PAGES[i][0] === current) { idx = i; break; }
  }

  var prev  = idx > 0               ? PAGES[idx - 1] : null;
  var next  = idx < PAGES.length-1  ? PAGES[idx + 1] : null;
  var label = PAGES[idx][1];

  function dot(p, i) {
    var cls = (i === idx) ? "page-nav-dot active" : "page-nav-dot";
    return "<button class=\"" + cls + "\" onclick=\"location.href='" + p[0] + "'\" title=\"" + p[1] + "\"></button>";
  }

  var arrowL = "<svg viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><polyline points=\"10 4 6 8 10 12\"/></svg>";
  var arrowR = "<svg viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><polyline points=\"6 4 10 8 6 12\"/></svg>";

  var prevBtn = prev
    ? "<a href=\"" + prev[0] + "\" class=\"page-nav-btn\" title=\"" + prev[1] + "\">" + arrowL + "<span class=\"pnb-label\">" + prev[1] + "</span></a>"
    : "<span class=\"page-nav-btn disabled\">" + arrowL + "</span>";

  var nextBtn = next
    ? "<a href=\"" + next[0] + "\" class=\"page-nav-btn\" title=\"" + next[1] + "\"><span class=\"pnb-label\">" + next[1] + "</span>" + arrowR + "</a>"
    : "<span class=\"page-nav-btn disabled\">" + arrowR + "</span>";

  var dotsHtml = "";
  for (var j = 0; j < PAGES.length; j++) { dotsHtml += dot(PAGES[j], j); }

  var nav = "<div class=\"page-nav\" role=\"navigation\" aria-label=\"Page navigation\">"
    + prevBtn
    + "<div class=\"page-nav-divider\"></div>"
    + "<div class=\"page-nav-center\">"
    + "<div class=\"page-nav-dots\">" + dotsHtml + "</div>"
    + "<span class=\"page-nav-label\">" + label + "</span>"
    + "</div>"
    + "<div class=\"page-nav-divider\"></div>"
    + nextBtn
    + "</div>";

  document.addEventListener("DOMContentLoaded", function() {
    document.body.insertAdjacentHTML("beforeend", nav);
  });
})();
</script>

</body>
</html>

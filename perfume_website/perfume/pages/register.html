<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AromaLux</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'>
<text y='50' font-size='50'>🧴</text>
</svg>">
</head>
<body class="antialiased bg-gray-50 min-h-screen flex items-center justify-center p-4 transition-colors duration-300">
    
    <!-- Theme & RTL Toggles -->
    <div class="absolute top-4 right-4 z-50 flex flex-col items-center gap-2 sm:fixed sm:top-6 sm:right-6 sm:flex-row">
        <button onclick="toggleRTL()" class="rtl-toggle w-10 h-10 bg-white rounded-full shadow-lg flex items-center justify-center transition-all font-bold" title="Toggle RTL/LTR">
            RTL
        </button>
        <button onclick="toggleDarkMode()" class="dark-mode-toggle w-10 h-10 bg-white rounded-full shadow-lg flex items-center justify-center transition-all" title="Toggle Dark Mode">
            <i class="fas fa-moon text-lg"></i>
        </button>
    </div>
    
    <div class="max-w-md w-full mt-12 sm:mt-0">
        <div class="auth-intro text-center mb-8">
            <a href="index.html" class="logo-brand inline-flex items-center space-x-2 mb-6">
                <i class="fas fa-spray-can text-4xl"></i>
                <span class="text-2xl sm:text-3xl font-bold font-serif">AromaLux</span>
            </a>
            <h1 class="text-3xl font-bold mb-2 text-gray-900">Create Account</h1>
            <p class="text-gray-600">Join our luxury fragrance community</p>
        </div>
        
        <div class="bg-white rounded-2xl shadow-xl p-8 border border-gray-100 transition-all">
            <form id="registerForm" onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold mb-2">Full Name</label>
                    <input type="text" required class="input-luxury" placeholder="John Doe">
                </div>
                
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold mb-2">Email Address</label>
                    <input type="email" required class="input-luxury" placeholder="your@email.com">
                </div>
                
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold mb-2">Password</label>
                    <input type="password" required class="input-luxury" placeholder="••••••••">
                </div>
                
                <div class="mb-6">
                    <label class="block text-gray-700 font-semibold mb-2">Confirm Password</label>
                    <input type="password" required class="input-luxury" placeholder="••••••••">
                </div>
                
                <div class="mb-6">
                    <label class="flex items-center cursor-pointer text-gray-600">
                        <input type="checkbox" required class="mr-2">
                        <span class="text-sm text-gray-600">I agree to the <a href="#" class="text-yellow-600 hover:underline">Terms</a> and <a href="#" class="text-yellow-600 hover:underline">Privacy Policy</a></span>
                    </label>
                </div>
                
                <button type="submit" class="btn-luxury w-full mb-6">Create Account</button>
            </form>

            <div class="relative mb-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-300"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-4 bg-white text-gray-500">Or continue with</span>
                </div>
            </div>
            
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
                <button class="flex items-center justify-center px-4 py-3 border-2 border-gray-300 rounded-lg hover:border-yellow-500 transition-colors">
                    <span class="inline-flex items-center w-[120px]">
                        <i class="fab fa-google text-red-500 w-8 text-center mr-3"></i>
                        <span class="text-sm font-medium">Google</span>
                    </span>
                </button>
                <button class="flex items-center justify-center px-4 py-3 border-2 border-gray-300 rounded-lg hover:border-yellow-500 transition-colors">
                    <span class="inline-flex items-center w-[120px]">
                        <i class="fab fa-facebook-f text-blue-600 w-8 text-center mr-3"></i>
                        <span class="text-sm font-medium">Facebook</span>
                    </span>
                </button>
                <button class="flex items-center justify-center px-4 py-3 border-2 border-gray-300 rounded-lg hover:border-yellow-500 transition-colors">
                    <span class="inline-flex items-center w-[120px]">
                        <i class="fa-brands fa-apple w-8 text-center mr-3"></i>
                        <span class="text-sm font-medium">Apple</span>
                    </span>
                </button>
            </div>
            
            <p class="text-center text-gray-600 text-sm sm:text-base whitespace-nowrap">
                Already have an account? 
                <a href="login.html" class="text-yellow-600 font-semibold hover:underline">Sign in</a>
            </p>
        </div>
        
    </div>
    
    <script src="../assets/js/main.js"></script>
</body>
</html>

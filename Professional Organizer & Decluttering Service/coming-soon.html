<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon | SpaceCraft Organizers</title>
  <meta name="description" content="We're crafting something beautiful. SpaceCraft Organizers is launching soon — sign up to be the first to know.">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/icons/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/images/icons/apple-touch-icon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/responsive-fix.css">
</head>
<body>
  <!-- NO NAVBAR ON COMING SOON PAGE -->
  <div class="coming-soon" style="background-image:url('assets/images/hero/hero-home1.png');">
    <div class="coming-soon-content">
      <div style="margin-bottom:32px;">
        <a href="index.html" style="display:inline-flex;flex-direction:column;align-items:center;gap:10px;">
          <div class="nav-brand-icon" style="width:56px;height:56px;font-size:1.5rem;"><i class="fas fa-leaf"></i></div>
          <span style="font-family:var(--font-accent);font-size:1.5rem;font-weight:700;color:#fff;">SpaceCraft</span>
        </a>
      </div>
      <h1>Something Beautiful Is Coming</h1>
      <p>We're putting the finishing touches on a new experience designed to bring calm and order to your world.</p>

      <!-- Countdown Timer -->
      <div class="countdown">
        <div class="countdown-item">
          <span class="countdown-value" data-days>30</span>
          <span class="countdown-label">Days</span>
        </div>
        <div class="countdown-item">
          <span class="countdown-value" data-hours>00</span>
          <span class="countdown-label">Hours</span>
        </div>
        <div class="countdown-item">
          <span class="countdown-value" data-mins>00</span>
          <span class="countdown-label">Minutes</span>
        </div>
        <div class="countdown-item">
          <span class="countdown-value" data-secs>00</span>
          <span class="countdown-label">Seconds</span>
        </div>
      </div>

      <!-- Email Signup -->
      <form class="coming-soon-form" data-validate>
        <input type="email" placeholder="Enter your email for early access" required aria-label="Email for early access">
        <button type="submit" class="btn btn-accent">Notify Me</button>
      </form>

      <!-- Social Links -->
      <div style="display:flex;gap:12px;justify-content:center;">
        <a href="#" style="width:44px;height:44px;border-radius:var(--radius-sm);background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;color:#fff;transition:all 0.2s;" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
        <a href="#" style="width:44px;height:44px;border-radius:var(--radius-sm);background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;color:#fff;transition:all 0.2s;" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
        <a href="#" style="width:44px;height:44px;border-radius:var(--radius-sm);background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;color:#fff;transition:all 0.2s;" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
        <a href="#" style="width:44px;height:44px;border-radius:var(--radius-sm);background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;color:#fff;transition:all 0.2s;" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
      </div>
    </div>
  </div>
  <!-- NO FOOTER ON COMING SOON PAGE -->
  <script src="assets/js/main.js"></script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="coffeeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#32201d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1412;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flameGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9c00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e85d04;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Main Background -->
  <rect width="512" height="512" rx="128" fill="url(#coffeeGrad)" />
  
  <!-- Subtle Outer Ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="12" />
  
  <!-- Stylized Bean/Flame Center -->
  <g transform="translate(128, 128) scale(0.5)">
    <!-- Darker Bean Background Circle -->
    <circle cx="256" cy="256" r="200" fill="#4a312c" opacity="0.4" />
    
    <!-- Flame Bean (Left side) -->
    <path d="M256 50 C200 50 150 150 150 256 C150 362 200 462 256 462 C312 462 312 362 312 256 C312 150 312 50 256 50 Z" fill="url(#flameGrad)" />
    
    <!-- Dark Bean (Right side) -->
    <path d="M256 50 C312 50 362 150 362 256 C362 362 312 462 256 462 C256 462 256 362 256 256 C256 150 256 50 256 50 Z" fill="#2a1817" opacity="0.6" />
    
    <!-- Brighter inner Flame Detail -->
    <path d="M256 100 C230 100 210 180 256 256 C302 332 282 412 256 412 C210 412 180 340 180 256 C180 180 200 100 256 100 Z" fill="#ffd000" opacity="0.7" />
  </g>
</svg>

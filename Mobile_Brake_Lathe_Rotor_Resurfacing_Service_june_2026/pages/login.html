<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BRAKE — Login</title>
  <meta name="description" content="Log in to your BRAKE account to manage bookings and view service history.">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'%3E%3Ccircle cx='60' cy='60' r='56' stroke='%23C41E3A' stroke-width='6' fill='none'/%3E%3Ccircle cx='60' cy='60' r='18' fill='%23C41E3A'/%3E%3Ccircle cx='60' cy='60' r='8' fill='%23fff'/%3E%3C/svg%3E">
  <style>
    /* Login-specific styling removed to allow scrolling on mobile */
  </style>
</head>
<body>
  <main class="auth-page">
    <div class="auth-card">
      <!-- Theme toggle (top-right, static on mobile) -->
      <div class="auth-theme-toggle">
        <button class="rtl-toggle" aria-label="Toggle text direction">LTR</button>
        <button class="nav-toggle-btn" id="theme-toggle" aria-label="Toggle dark mode"><i class="ph ph-moon"></i></button>
      </div>
      <div class="auth-header">
        <a href="index.html" aria-label="BRAKE Home">
          <svg width="48" height="48" viewBox="0 0 120 120" fill="none"><circle cx="60" cy="60" r="56" stroke="#C41E3A" stroke-width="6"/><circle cx="60" cy="60" r="38" stroke="#C41E3A" stroke-width="3" stroke-dasharray="8 4"/><circle cx="60" cy="60" r="18" fill="#C41E3A"/><circle cx="60" cy="60" r="8" fill="#FAFAFA"/></svg>
        </a>
        <div class="logo-text">BRAKE</div>
        <p>Welcome back! Please sign in to continue.</p>
      </div>

      <!-- Social Login -->
      <div class="social-login">
        <button class="social-btn social-btn-google" type="button">
          <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Continue with Google
        </button>
        <button class="social-btn social-btn-apple" type="button">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
          Continue with Apple
        </button>
        <button class="social-btn social-btn-facebook" type="button">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M24 12.07C24 5.41 18.63 0 12 0S0 5.41 0 12.07C0 18.1 4.39 23.1 10.13 24v-8.44H7.08v-3.49h3.04V9.41c0-3.02 1.79-4.7 4.53-4.7 1.31 0 2.68.24 2.68.24v2.97h-1.51c-1.49 0-1.95.93-1.95 1.89v2.26h3.32l-.53 3.49h-2.8V24C19.61 23.1 24 18.1 24 12.07z"/></svg>
          Continue with Facebook
        </button>
      </div>

      <div class="auth-divider">or sign in with email</div>

      <!-- Email Login Form -->
      <form data-validate>
        <div class="form-group">
          <label class="form-label" for="login-email">Email Address</label>
          <input type="email" id="login-email" required placeholder="you@example.com">
          <div class="form-error"><i class="ph ph-warning-circle"></i> <span></span></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input type="password" id="login-password" required placeholder="Enter your password" minlength="6">
          <div class="form-error"><i class="ph ph-warning-circle"></i> <span></span></div>
        </div>
        <div class="auth-form-extras">
          <label class="checkbox-group"><input type="checkbox"><span>Remember me</span></label>
          <a href="#">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Sign In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Sign Up</a>
      </div>
    </div>
  </main>

  <script src="../assets/js/main.js"></script>
</body>
</html>

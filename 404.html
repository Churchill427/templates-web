<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexaFlow — 404 Not Found</title>
  <link rel="stylesheet" href="style.css" />
  <script src="rtl-toggle.js"></script>
</head>
<body>

<div class="error-page">
  <div class="bg-dots"></div>
  <div style="position:relative; max-width:560px;">
    <div class="error-code">404</div>
    <h2 style="margin-bottom:16px; margin-top:8px;">Page not found</h2>
    <p style="font-size:18px; margin-bottom:40px;">Looks like this page went on a workflow automation journey and didn't come back. Let's get you somewhere useful.</p>
    <div class="flex-center gap-12" style="flex-wrap:wrap;">
      <a href="index.html" class="btn btn-primary btn-lg">← Back to Home</a>
      <a href="contact.html" class="btn btn-outline btn-lg">Contact Support</a>
    </div>
    <div class="mt-48" style="display:flex; flex-direction:column; gap:12px; align-items:center;">
      <p class="text-sm" style="color:var(--clr-muted);">Or try one of these:</p>
      <div class="flex gap-12" style="flex-wrap:wrap; justify-content:center;">
        <a href="pricing.html" class="btn btn-ghost btn-sm">Pricing</a>
        <a href="blog.html" class="btn btn-ghost btn-sm">Blog</a>
        <a href="login.html" class="btn btn-ghost btn-sm">Login</a>
        <a href="register.html" class="btn btn-ghost btn-sm">Register</a>
      </div>
    </div>
  </div>
</div>

<script src="main.js"></script>
</body>
</html>
